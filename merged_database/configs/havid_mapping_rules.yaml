{
  "dataset_name": "havid",
  "version": "v1",
  "fps_default": 25,
  "fields": {
    "session_id": {"source": ["video_session", "session_id", "clip_id"], "required": true, "unit": null, "notes": "Video/session id"},
    "sequence_id": {"source": ["sequence_id", "segment_id"], "required": false, "unit": null, "notes": "Optional segment id"},
    "subject_id": {"source": ["subject", "subject_id", "operator_id"], "required": false, "unit": null, "notes": "Optional subject id"},
    "record_id": {"source": ["record_id", "frame_uid"], "required": false, "unit": null, "notes": "Raw unique id"},
    "frame_index": {"source": ["frame_id", "frame_index", "frame"], "required": true, "unit": "index", "notes": "Frame index"},
    "timestamp": {"source": ["time_ms", "timestamp_ms", "time_sec"], "required": false, "unit": "ms_or_s", "notes": "Seconds converted to ms for small values"},
    "left_x": {"source": ["wrist_l_x", "left_wrist_x", "l_wrist_x"], "required": true, "unit": "px_or_norm", "notes": "Left wrist x"},
    "left_y": {"source": ["wrist_l_y", "left_wrist_y", "l_wrist_y"], "required": true, "unit": "px_or_norm", "notes": "Left wrist y"},
    "right_x": {"source": ["wrist_r_x", "right_wrist_x"], "required": false, "unit": "px_or_norm", "notes": "Right wrist x"},
    "right_y": {"source": ["wrist_r_y", "right_wrist_y"], "required": false, "unit": "px_or_norm", "notes": "Right wrist y"},
    "pose_confidence": {"source": ["pose_confidence", "conf"], "required": false, "unit": "0_1", "notes": "Pose confidence"},
    "task_name": {"source": ["task", "task_name"], "required": false, "unit": null, "notes": "Task"},
    "task_step": {"source": ["step_name", "step_id"], "required": false, "unit": null, "notes": "Step"},
    "action_label": {"source": ["action", "action_label", "event"], "required": false, "unit": null, "notes": "Raw action"},
    "manipulated_object": {"source": ["object", "manipulated_object"], "required": false, "unit": null, "notes": "Primary object"},
    "target_object": {"source": ["target", "target_object"], "required": false, "unit": null, "notes": "Target object"},
    "tool": {"source": ["tool", "tool_name"], "required": false, "unit": null, "notes": "Tool info"},
    "human_robot_distance": {"source": ["human_robot_distance", "distance_hr"], "required": false, "unit": "m", "notes": "Distance proxy"},
    "shared_workspace_flag": {"source": ["shared_zone", "shared_workspace_flag"], "required": false, "unit": "bool", "notes": "Shared zone flag"},
    "rework_native_flag": {"source": ["rework", "rework_native_flag"], "required": false, "unit": "bool", "notes": "Native rework"},
    "overlap_event_native": {"source": ["overlap_event", "overlap_event_native"], "required": false, "unit": "bool", "notes": "Native overlap"},
    "collision_event_native": {"source": ["collision_event", "collision_event_native"], "required": false, "unit": "bool", "notes": "Native collision"},
    "annotation_reference": {"source": ["annotation_id", "annotation_ref"], "required": false, "unit": null, "notes": "Annotation ref"}
  },
  "action_map": {
    "reach": "reach",
    "grasp": "pick",
    "pick": "pick",
    "align": "align",
    "screw": "assemble",
    "insert": "assemble",
    "place": "place",
    "idle": "wait",
    "wait": "wait",
    "rework": "rework"
  }
}
